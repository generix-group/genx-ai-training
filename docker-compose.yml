version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gnx-ai-training-postgres
    environment:
      POSTGRES_DB: gnxaitraining
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgadmin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
